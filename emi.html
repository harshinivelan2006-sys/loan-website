<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMI Calculator - THAI MOOGAMBIKHA ENTERPRISES</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="logo">
        <h2>THAI MOOGAMBIKHA ENTERPRISES</h2>
    </div>
</header>

<section class="loan-page">

    <h1>EMI Calculator</h1>

    <div class="loan-card">

        <label>Loan Amount (₹)</label>
        <input type="number" id="amount" placeholder="Enter Loan Amount">

        <label>Interest Rate (%)</label>
        <input type="number" id="rate" placeholder="Enter Interest Rate">

        <label>Loan Tenure (Years)</label>
        <input type="number" id="years" placeholder="Enter Tenure">

        <button onclick="calculateEMI()" class="apply-btn">
            Calculate EMI
        </button>

        <h2 id="result"></h2>

    </div>

</section>

<script src="javascript/emi.js"></script>

</body>
</html>
